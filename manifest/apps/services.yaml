# ============================================
# Order Service - 订单服务
# ============================================

---
# Service - ClusterIP (内部访问)
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: default
  labels:
    app: order
    component: service
spec:
  type: ClusterIP
  selector:
    app: order
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: grpc
      port: 5002
      targetPort: 5002
      protocol: TCP
---
# Deployment - 高可用配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: default
  labels:
    app: order
    version: v1
spec:
  # 高可用: 多副本
  replicas: 1
  # 滚动更新策略
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      # 反亲和性 - 尽量分散到不同节点
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - order
                topologyKey: kubernetes.io/hostname
      # 拓扑分布策略 - 跨区域分布
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order
      # 优雅终止
      terminationGracePeriodSeconds: 30
      containers:
        - name: order
          image: mallive/order:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
            - containerPort: 5002
              name: grpc
              protocol: TCP
          # 环境变量 - 配置文件路径
          env:
            - name: CONFIG_PATH
              value: "/config/global.yaml"
          # 资源配置
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: mallive-config
            items:
              - key: global.yaml
                path: global.yaml

---
# HPA - 自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# PodDisruptionBudget - 保证最小可用副本
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: order-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: order


