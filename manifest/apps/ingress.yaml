# Ingress 配置 - 外部 HTTP 访问
# 需要 ingress controller (nginx-ingress / traefik)

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mallive-ingress
  namespace: default
  annotations:
    # Nginx Ingress Controller
    kubernetes.io/ingress.class: nginx
    # SSL 重定向
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # 代理超时
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    proxy-body-size: "10m"
    # 熔断配置
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_next_upstream_timeout 10s;
spec:
  rules:
    # Order Service
    - host: order.mallive.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-http
                port:
                  number: 8082
    # Payment Service
    - host: payment.mallive.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payment-http
                port:
                  number: 8084
---
